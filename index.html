<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚽ Registro de jugadores y tiempo de juego</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --green: #2ecc40;
    --green-dark: #1a8a26;
    --red: #e74c3c;
    --red-dark: #a93226;
    --yellow: #f5c518;
    --blue-dark: #1a2a3a;
    --blue-mid: #243447;
    --blue-light: #2e4261;
    --white: #f0f4f8;
    --gray: #7f8c8d;
    --card-bg: #1e3050;
    --border: #2e4a6e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--blue-dark);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--blue-mid);
    border-bottom: 3px solid var(--yellow);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--yellow);
  }
  #clock {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 2px;
    min-width: 90px;
    text-align: right;
  }

  /* SCREENS */
  .screen { display: none; padding: 16px; }
  .screen.active { display: block; }

  /* SETUP SCREEN */
  #setup-screen h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--yellow);
    margin-bottom: 16px;
    text-align: center;
  }
  #player-inputs { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .player-input-row { display: flex; gap: 8px; align-items: center; }
  .player-input-row input {
    flex: 1;
    padding: 14px 12px;
    font-size: 1.1rem;
    font-family: 'Barlow', sans-serif;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--card-bg);
    color: var(--white);
    outline: none;
  }
  .player-input-row input:focus { border-color: var(--yellow); }
  .btn-remove-player {
    background: var(--red);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 1.3rem;
    padding: 10px 14px;
    cursor: pointer;
  }

  .btn { border: none; border-radius: 12px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: transform 0.1s, filter 0.1s; }
  .btn:active { transform: scale(0.96); filter: brightness(0.9); }

  .btn-add {
    width: 100%;
    background: var(--blue-light);
    color: var(--white);
    font-size: 1.1rem;
    padding: 14px;
    margin-bottom: 12px;
    border: 2px dashed var(--border);
  }
  .btn-start {
    width: 100%;
    background: var(--green);
    color: #fff;
    font-size: 1.4rem;
    padding: 18px;
    letter-spacing: 1px;
  }

  /* PAUSE/RESUME BIG BUTTON */
  #pause-bar {
    position: sticky;
    top: 61px;
    z-index: 90;
    padding: 10px 16px 6px;
    background: var(--blue-dark);
  }
  #btn-pause {
    width: 100%;
    background: var(--yellow);
    color: var(--blue-dark);
    font-size: 1.5rem;
    padding: 18px;
    border-radius: 14px;
    letter-spacing: 2px;
    box-shadow: 0 4px 0 #a88800;
  }
  #btn-pause.paused {
    background: var(--green);
    color: #fff;
    box-shadow: 0 4px 0 var(--green-dark);
  }

  /* PAUSED BANNER */
  #paused-banner {
    display: none;
    background: rgba(0,0,0,0.55);
    text-align: center;
    padding: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    color: var(--yellow);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #paused-banner.visible { display: block; }

  /* PLAYER LIST */
  #player-list { padding: 0 16px; margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }

  /* Card — neutral, no color change */
  .player-card {
    background: var(--card-bg);
    border-radius: 14px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    padding: 10px 10px 10px 14px;
    gap: 10px;
    min-height: 72px;
  }

  .player-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--gray);
    min-width: 20px;
    text-align: center;
    flex-shrink: 0;
  }

  .player-info { flex: 1; min-width: 0; }
  .player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* En Cancha / En Banca text */
  .player-status-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .player-status-label.en-cancha { color: var(--green); }
  .player-status-label.en-banca  { color: var(--gray); }

  .player-time {
    font-size: 0.88rem;
    color: #a0b4c8;
    margin-top: 1px;
    font-variant-numeric: tabular-nums;
  }

  /* Single toggle button per player */
  .btn-toggle {
    min-width: 86px;
    height: 54px;
    border-radius: 12px;
    font-size: 1.05rem;
    padding: 0 10px;
    flex-shrink: 0;
    border: none;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: transform 0.1s, filter 0.1s;
  }
  .btn-toggle:active { transform: scale(0.93); filter: brightness(0.88); }
  .btn-toggle.go-in  { background: var(--green); color: #fff; }
  .btn-toggle.go-out { background: var(--red);   color: #fff; }

  /* END GAME BAR */
  #end-bar { padding: 16px; margin-top: 8px; }
  #btn-end {
    width: 100%;
    background: linear-gradient(135deg, #c0392b, #e74c3c);
    color: white;
    font-size: 1.3rem;
    padding: 18px;
    box-shadow: 0 4px 0 #7b241c;
    letter-spacing: 1px;
  }

  /* RESULTS */
  .results-section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--yellow);
    letter-spacing: 1px;
    margin: 18px 0 8px;
    border-bottom: 2px solid var(--border);
    padding-bottom: 4px;
  }
  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    background: var(--card-bg);
    border-radius: 10px;
    margin-bottom: 7px;
    border-left: 4px solid var(--green);
  }
  .result-name { font-family: 'Barlow Condensed', sans-serif; font-size: 1.15rem; font-weight: 700; text-transform: uppercase; }
  .result-time { font-size: 1.05rem; font-weight: 600; color: var(--green); font-variant-numeric: tabular-nums; }

  .interval-card {
    background: var(--card-bg);
    border-radius: 10px;
    margin-bottom: 7px;
    padding: 10px 14px;
    border-left: 4px solid var(--blue-light);
  }
  .interval-time { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 700; color: var(--yellow); margin-bottom: 3px; }
  .interval-players { font-size: 0.92rem; color: var(--white); line-height: 1.4; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--blue-mid);
    border: 2px solid var(--yellow);
    border-radius: 18px;
    padding: 28px 24px;
    max-width: 320px;
    width: 90%;
    text-align: center;
  }
  .modal h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--yellow); text-transform: uppercase; margin-bottom: 10px; }
  .modal p { color: var(--white); margin-bottom: 22px; font-size: 1rem; }
  .modal-btns { display: flex; gap: 12px; }
  .modal-btns .btn { flex: 1; font-size: 1.1rem; padding: 16px; }
  .btn-confirm-end { background: var(--red); color: white; }
  .btn-cancel { background: var(--blue-light); color: white; }
</style>
</head>
<body>

<header>
  <h1>⚽ Registro de jugadores y tiempo de juego</h1>
  <div id="clock">00:00</div>
</header>

<!-- SETUP SCREEN -->
<div id="setup-screen" class="screen active">
  <h2>Nuevo Partido — Agregar pichanguero</h2>
  <div id="player-inputs"></div>
  <button class="btn btn-add" onclick="addPlayerInput()">＋ Agregar Jugador</button>
  <button class="btn btn-start" onclick="startGame()">▶ Empezar Pichanga</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen" class="screen">
  <div id="pause-bar">
    <button class="btn btn-pause" id="btn-pause" onclick="togglePause()">⏸ Pausar Partido</button>
  </div>
  <div id="paused-banner">⏸ PARTIDO PAUSADO</div>
  <div id="player-list"></div>
  <div id="end-bar">
    <button class="btn btn-end" onclick="showEndConfirm()">🏁 Pitazo Final</button>
  </div>
</div>

<!-- RESULTS SCREEN (unused shell) -->
<div id="results-screen" class="screen"></div>

<!-- CONFIRM END MODAL -->
<div class="modal-overlay" id="end-modal">
  <div class="modal">
    <h3>Terminar Partido?</h3>
    <p>Seguro? Se para el tiempo y se graban los resultados.</p>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="hideEndConfirm()">Cancelar</button>
      <button class="btn btn-confirm-end" onclick="endGame()">Terminar Partido</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let players = [];
let gameRunning = false;
let gamePaused = false;
let gameStartTime = null;
let gameElapsed = 0;
let pauseStart = null;
let clockInterval = null;

let intervals = [];
let currentIntervalStart = 0;
let currentOnField = [];

// ── SETUP ──────────────────────────────────────────────────────────────────
function init() {
  const container = document.getElementById('player-inputs');
  container.innerHTML = '';
  for (let i = 0; i < 7; i++) addPlayerInput();
}

function addPlayerInput() {
  const container = document.getElementById('player-inputs');
  const idx = container.children.length + 1;
  const row = document.createElement('div');
  row.className = 'player-input-row';
  row.innerHTML = `
    <input type="text" placeholder="Jugador ${idx}" autocomplete="off" autocorrect="off" autocapitalize="words" />
    <button class="btn btn-remove-player" onclick="removePlayerInput(this)">✕</button>
  `;
  container.appendChild(row);
}

function removePlayerInput(btn) {
  const container = document.getElementById('player-inputs');
  if (container.children.length > 1) btn.parentElement.remove();
}

function startGame() {
  const inputs = document.querySelectorAll('#player-inputs input');
  players = [];
  inputs.forEach((inp, i) => {
    const name = inp.value.trim() || `Jugador ${i + 1}`;
    players.push({ name, onField: false, fieldTime: 0, fieldStart: null });
  });
  if (players.length < 1) { alert('Agrega al menos un jugador.'); return; }

  gameRunning = true;
  gamePaused = false;
  gameStartTime = Date.now();
  gameElapsed = 0;
  pauseStart = null;
  intervals = [];
  currentIntervalStart = 0;
  currentOnField = [];

  renderPlayerList();
  showScreen('game-screen');
  startClock();
}

// ── CLOCK ──────────────────────────────────────────────────────────────────
function startClock() {
  clearInterval(clockInterval);
  clockInterval = setInterval(() => {
    if (!gamePaused) gameElapsed = Date.now() - gameStartTime;
    document.getElementById('clock').textContent = formatTime(gameElapsed);
    updatePlayerTimes();
  }, 500);
}

function formatTime(ms) {
  const total = Math.floor(ms / 1000);
  const m = Math.floor(total / 60).toString().padStart(2, '0');
  const s = (total % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function formatTimeLabel(ms) {
  const total = Math.floor(ms / 1000);
  const m = Math.floor(total / 60);
  const s = (total % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

// ── PAUSE ──────────────────────────────────────────────────────────────────
function togglePause() {
  const btn = document.getElementById('btn-pause');
  const banner = document.getElementById('paused-banner');
  if (!gamePaused) {
    gamePaused = true;
    pauseStart = Date.now();
    players.forEach(p => {
      if (p.onField && p.fieldStart !== null) {
        p.fieldTime += Date.now() - p.fieldStart;
        p.fieldStart = null;
      }
    });
    btn.textContent = '▶ Reanudar Partido';
    btn.classList.add('paused');
    banner.classList.add('visible');
  } else {
    gamePaused = false;
    const pausedDuration = Date.now() - pauseStart;
    gameStartTime += pausedDuration;
    pauseStart = null;
    players.forEach(p => {
      if (p.onField) p.fieldStart = Date.now();
    });
    btn.textContent = '⏸ Pausar Partido';
    btn.classList.remove('paused');
    banner.classList.remove('visible');
  }
}

// ── PLAYER TOGGLE ─────────────────────────────────────────────────────────
function togglePlayer(idx) {
  if (gamePaused) return;
  closeInterval();
  if (players[idx].onField) {
    // → bench
    if (players[idx].fieldStart !== null) {
      players[idx].fieldTime += Date.now() - players[idx].fieldStart;
      players[idx].fieldStart = null;
    }
    players[idx].onField = false;
  } else {
    // → field
    players[idx].onField = true;
    players[idx].fieldStart = Date.now();
  }
  currentOnField = players.filter(p => p.onField).map(p => p.name);
  currentIntervalStart = gameElapsed;
  renderPlayerList();
}

function closeInterval() {
  if (currentOnField.length > 0) {
    intervals.push({
      start: currentIntervalStart,
      end: gameElapsed,
      playerNames: [...currentOnField]
    });
  }
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function renderPlayerList() {
  const list = document.getElementById('player-list');
  list.innerHTML = '';
  players.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'player-card';
    card.id = `card-${i}`;

    const statusClass = p.onField ? 'en-cancha' : 'en-banca';
    const statusText  = p.onField ? 'En Cancha'  : 'En Banca';
    const btnClass    = p.onField ? 'go-out'      : 'go-in';
    const btnText     = p.onField ? 'Salir'        : 'Entrar';

    card.innerHTML = `
      <div class="player-num">${i + 1}</div>
      <div class="player-info">
        <div class="player-name">${escHtml(p.name)}</div>
        <div class="player-status-label ${statusClass}">${statusText}</div>
        <div class="player-time" id="ptime-${i}">${formatTime(p.fieldTime)}</div>
      </div>
      <button class="btn-toggle ${btnClass}" onclick="togglePlayer(${i})">${btnText}</button>
    `;
    list.appendChild(card);
  });
}

function updatePlayerTimes() {
  players.forEach((p, i) => {
    const el = document.getElementById(`ptime-${i}`);
    if (!el) return;
    let t = p.fieldTime;
    if (p.onField && p.fieldStart !== null && !gamePaused) t += Date.now() - p.fieldStart;
    el.textContent = formatTime(t);
  });
}

// ── END GAME ───────────────────────────────────────────────────────────────
function showEndConfirm() { document.getElementById('end-modal').classList.add('visible'); }
function hideEndConfirm() { document.getElementById('end-modal').classList.remove('visible'); }

function endGame() {
  hideEndConfirm();
  clearInterval(clockInterval);

  closeInterval();
  players.forEach(p => {
    if (p.onField && p.fieldStart !== null) {
      p.fieldTime += Date.now() - p.fieldStart;
      p.fieldStart = null;
    }
    p.onField = false;
  });

  gameRunning = false;
  showResults();
}

// ── RESULTS ──────────────────────────────────────────────────────────────
function showResults() {
  const now = new Date();
  const dateStr = now.toLocaleDateString('es-CL', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  const dateFile = now.toISOString().slice(0, 10);
  const sorted = [...players].sort((a, b) => b.fieldTime - a.fieldTime);

  document.getElementById('pause-bar').style.display = 'none';
  document.getElementById('paused-banner').style.display = 'none';
  document.getElementById('end-bar').style.display = 'none';

  const list = document.getElementById('player-list');
  let html = `
    <div style="text-align:center;margin-bottom:6px;">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:2rem;font-weight:800;color:var(--yellow);text-transform:uppercase;letter-spacing:1px;">🏁 Pitazo Final</div>
      <div style="color:var(--gray);font-size:0.88rem;margin-top:2px;">${dateStr}</div>
    </div>
    <div class="results-section-title">⏱ Tiempo en cancha</div>
  `;
  sorted.forEach(p => {
    html += `<div class="result-row">
      <span class="result-name">${escHtml(p.name)}</span>
      <span class="result-time">${formatTime(p.fieldTime)}</span>
    </div>`;
  });

  html += '<div class="results-section-title">🔄 Intervalos en cancha</div>';
  if (intervals.length === 0) {
    html += '<div style="color:var(--gray);font-size:0.9rem;padding:8px 0;">Sin cambios registrados.</div>';
  }
  intervals.forEach(iv => {
    if (iv.playerNames.length === 0) return;
    html += `<div class="interval-card">
      <div class="interval-time">${formatTimeLabel(iv.start)} → ${formatTimeLabel(iv.end)}</div>
      <div class="interval-players">${iv.playerNames.map(n => escHtml(n)).join(', ')}</div>
    </div>`;
  });

  html += `
    <div id="save-indicator" style="text-align:center;color:var(--green);font-size:0.88rem;margin-top:10px;"></div>
    <button class="btn" onclick="newGame()" style="width:100%;background:var(--green);color:white;font-size:1.3rem;padding:18px;margin-top:16px;box-shadow:0 4px 0 var(--green-dark);border-radius:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:1px;">⚽ Nueva Pichanga</button>
    <div style="height:24px;"></div>
  `;

  list.innerHTML = html;
  saveToFile(sorted, intervals, dateFile, dateStr);
}

function saveToFile(sorted, ivs, dateFile, dateStr) {
  let text = `RESUMEN DEL PARTIDO — ${dateStr}\n`;
  text += '='.repeat(50) + '\n\n';
  text += 'TIEMPO EN CANCHA\n';
  text += '-'.repeat(30) + '\n';
  sorted.forEach(p => {
    text += `${p.name.padEnd(20)} ${formatTime(p.fieldTime)}\n`;
  });
  text += '\nINTERVALOS EN CANCHA\n';
  text += '-'.repeat(30) + '\n';
  ivs.forEach(iv => {
    if (iv.playerNames.length === 0) return;
    text += `${formatTimeLabel(iv.start)} a ${formatTimeLabel(iv.end)}: ${iv.playerNames.join(', ')}\n`;
  });

  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `pichanga-${dateFile}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  const ind = document.getElementById('save-indicator');
  if (ind) {
    ind.style.display = 'block';
    ind.textContent = `✅ Guardado como pichanga-${dateFile}.txt`;
  }
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function newGame() {
  document.getElementById('pause-bar').style.display = '';
  document.getElementById('paused-banner').style.display = '';
  document.getElementById('end-bar').style.display = '';
  showScreen('setup-screen');
  document.getElementById('clock').textContent = '00:00';
  init();
}

// ── OFFLINE: SERVICE WORKER (inline blob) ─────────────────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'pichanga-v1';

    self.addEventListener('install', e => {
      e.waitUntil(
        caches.open(CACHE)
          .then(cache => cache.add(self.location.origin + self.location.pathname.replace(/\\/[^\\/]*$/, '/') || '/'))
          .then(() => self.skipWaiting())
          .catch(() => self.skipWaiting())
      );
    });

    self.addEventListener('activate', e => {
      e.waitUntil(
        caches.keys().then(keys =>
          Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
        ).then(() => self.clients.claim())
      );
    });

    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(cached => {
          if (cached) return cached;
          return fetch(e.request).then(response => {
            if (response && response.status === 200 && response.type !== 'opaque') {
              const clone = response.clone();
              caches.open(CACHE).then(cache => cache.put(e.request, clone));
            }
            return response;
          }).catch(() => caches.match(e.request));
        })
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl  = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ── BOOT ──────────────────────────────────────────────────────────────────
window.addEventListener('beforeunload', function(e) {
  if (gameRunning) {
    e.preventDefault();
    e.returnValue = '';
  }
});
init();
